<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Clicker - Click to Lay Egg!</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #0b3d0b;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: Arial, sans-serif;
            user-select: none;
        }

        #game {
            position: relative;
            width: 520px;
            height: 400px;
            cursor: pointer;
            background: url('https://tse3.mm.bing.net/th/id/OIP.UAKbI7cIOQy0rkg8Zg1pNQHaEK?rs=1&pid=ImgDetMain&o=7&rm=3') center/cover no-repeat;
            border: 10px solid #5C4033;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        #chicken {
            position: absolute;
            left: 50%;
            top: 52%;
            transform: translate(-50%, -50%);
            width: 190px;
            transition: transform 0.08s;
            z-index: 5;
            image-rendering: pixelated;
        }

        #chicken:active {
            transform: translate(-50%, -50%) scale(0.88);
        }

        .egg {
            position: absolute;
            width: 58px;
            height: 78px;
            background: url('https://gamepedia.cursecdn.com/minecraft_gamepedia/9/96/Egg_JE2_BE2.png') center/contain no-repeat;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6));
            animation: layEgg 2.8s forwards;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes layEgg {
            0%   { bottom: 95px; left: 220px; transform: scale(0.1) rotate(-35deg); opacity: 0; }
            30%  { opacity: 1; }
            70%  { transform: scale(1.1) rotate(8deg); }
            100% { bottom: -130px; transform: scale(0.95) rotate(30deg); opacity: 0; }
        }

        #score {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 3px 3px 0 #000;
            background: rgba(0,0,0,0.45);
            padding: 8px 20px;
            border-radius: 10px;
            z-index: 20;
        }

        #title {
            position: absolute;
            top: 18px;
            right: 18px;
            color: #ffeb3b;
            font-size: 19px;
            text-shadow: 2px 2px 0 #000;
            z-index: 20;
        }
    </style>
</head>
<body>

<div id="game">
    <div id="score">Eggs laid: <span id="count">0</span></div>
    <div id="title">Farm Clicker</div>
    
    <!-- Your chicken image -->
    <img id="chicken" 
         src="https://image.pngaaa.com/441/611441-middle.png" 
         alt="Chicken">
</div>

<script>
    const chicken = document.getElementById('chicken');
    const gameArea = document.getElementById('game');
    let eggCount = 0;
    const countEl = document.getElementById('count');

    function playPolb() {
        try {
            const audio = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audio.createOscillator();
            const gain = audio.createGain();
            const filter = audio.createBiquadFilter();
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(280, audio.currentTime);
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(850, audio.currentTime);
            
            gain.gain.setValueAtTime(0.9, audio.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.45);
            
            osc.connect(filter).connect(gain).connect(audio.destination);
            osc.start();
            osc.stop(audio.currentTime + 0.55);
            
            setTimeout(() => {
                const osc2 = audio.createOscillator();
                osc2.type = 'square';
                osc2.frequency.setValueAtTime(135, audio.currentTime);
                const g2 = audio.createGain();
                g2.gain.value = 0.5;
                g2.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.25);
                osc2.connect(g2).connect(audio.destination);
                osc2.start();
                osc2.stop(audio.currentTime + 0.3);
            }, 90);
        } catch(e) {}
    }

    chicken.addEventListener('click', () => {
        playPolb();

        eggCount++;
        countEl.textContent = eggCount;

        const egg = document.createElement('div');
        egg.className = 'egg';
        
        const offset = Math.random() * 90 - 45;
        egg.style.left = `calc(220px + ${offset}px)`;
        
        gameArea.appendChild(egg);

        setTimeout(() => egg.remove(), 3200);
    });

    // Press any key to also lay an egg
    document.addEventListener('keypress', () => chicken.click());
</script>

</body>
</html>
