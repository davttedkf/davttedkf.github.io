<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Clicker</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #0b3d0b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Comic Sans MS", cursive, sans-serif;
            overflow: hidden;
            color: white;
        }

        #game {
            position: relative;
            width: 620px;
            height: 420px;
            background: url('https://tse3.mm.bing.net/th/id/OIP.UAKbI7cIOQy0rkg8Zg1pNQHaEK?rs=1&pid=ImgDetMain&o=7&rm=3') center/cover no-repeat;
            border: 12px solid #5C4033;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        #chicken {
            position: absolute;
            left: 50%;
            top: 48%;
            transform: translate(-50%, -50%);
            width: 210px;
            cursor: pointer;
            transition: transform 0.1s;
            z-index: 10;
            image-rendering: pixelated;
        }

        #chicken:active {
            transform: translate(-50%, -50%) scale(0.85);
        }

        .egg {
            position: absolute;
            width: 55px;
            height: 75px;
            background: url('https://gamepedia.cursecdn.com/minecraft_gamepedia/9/96/Egg_JE2_BE2.png') center/contain no-repeat;
            filter: drop-shadow(0 10px 15px #000);
            pointer-events: none;
            z-index: 5;
            animation: layEgg 2.8s forwards;
        }

        @keyframes layEgg {
            0%   { bottom: 100px; left: 260px; transform: scale(0.1) rotate(-40deg); opacity: 0; }
            30%  { opacity: 1; }
            70%  { transform: scale(1.1) rotate(10deg); }
            100% { bottom: -140px; transform: scale(0.9) rotate(35deg); opacity: 0; }
        }

        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            font-weight: bold;
            text-shadow: 4px 4px 0 #000;
            background: rgba(0,0,0,0.5);
            padding: 10px 30px;
            border-radius: 12px;
            z-index: 20;
        }

        #click-info {
            position: absolute;
            font-size: 18px;
            color: #ffeb3b;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            z-index: 30;
            animation: floatUp 1.2s forwards;
        }

        #title {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 22px;
            color: #ffeb3b;
            text-shadow: 3px 3px 0 #000;
            z-index: 20;
        }
    </style>
</head>
<body>

<div id="game">
    <div id="score">Eggs: <span id="count">0</span></div>
    <div id="title">Minecraft Chicken Clicker</div>
    
    <!-- Your new chicken image -->
    <img id="chicken" 
         src="https://i.imgur.com/yfxY2.png" 
         alt="Chicken">
</div>

<script>
    const chicken = document.getElementById('chicken');
    const gameArea = document.getElementById('game');
    let eggCount = 0;
    const countEl = document.getElementById('count');

    function playPolb() {
        try {
            const audio = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audio.createOscillator();
            const gain = audio.createGain();
            const filter = audio.createBiquadFilter();
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(260, audio.currentTime);
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(900, audio.currentTime);
            
            gain.gain.setValueAtTime(1, audio.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.4);
            
            osc.connect(filter).connect(gain).connect(audio.destination);
            osc.start();
            osc.stop(audio.currentTime + 0.5);
            
            setTimeout(() => {
                const osc2 = audio.createOscillator();
                osc2.type = 'square';
                osc2.frequency.setValueAtTime(140, audio.currentTime);
                const g2 = audio.createGain();
                g2.gain.value = 0.6;
                g2.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.22);
                osc2.connect(g2).connect(audio.destination);
                osc2.start();
                osc2.stop(audio.currentTime + 0.3);
            }, 70);
        } catch(e) {}
    }

    function createFloatingText(x, y) {
        const text = document.createElement('div');
        text.id = 'click-info';
        text.textContent = '+1';
        text.style.left = x + 'px';
        text.style.top = y + 'px';
        gameArea.appendChild(text);

        setTimeout(() => text.remove(), 1300);
    }

    chicken.addEventListener('click', (e) => {
        playPolb();

        eggCount++;
        countEl.textContent = eggCount;

        // Floating +1 text near click
        const rect = chicken.getBoundingClientRect();
        const gameRect = gameArea.getBoundingClientRect();
        const clickX = e.clientX - gameRect.left + (Math.random() * 40 - 20);
        const clickY = e.clientY - gameRect.top - 30;
        createFloatingText(clickX, clickY);

        // Lay an egg
        const egg = document.createElement('div');
        egg.className = 'egg';
        
        const offset = Math.random() * 100 - 50;
        egg.style.left = `calc(260px + ${offset}px)`;
        
        gameArea.appendChild(egg);
        setTimeout(() => egg.remove(), 3100);
    });

    // Keyboard support
    document.addEventListener('keypress', () => chicken.click());
</script>

</body>
</html>
