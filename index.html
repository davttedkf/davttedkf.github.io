<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DO NOT PRESS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #ff2222;
    --dark: #0a0a0a;
    --glow: #ff222288;
  }

  body {
    min-height: 100vh;
    background: var(--dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: default;
    font-family: 'Barlow', sans-serif;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: -50%;
    background-image:
      linear-gradient(rgba(255,34,34,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,34,34,0.07) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridscroll 8s linear infinite;
    z-index: 0;
  }
  @keyframes gridscroll {
    0%   { transform: translate(0, 0); }
    100% { transform: translate(48px, 48px); }
  }

  /* Vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, #0a0a0a 90%);
    z-index: 0;
    pointer-events: none;
  }

  .scene {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }

  .warning-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(13px, 2vw, 18px);
    letter-spacing: 0.35em;
    color: #ff2222aa;
    text-transform: uppercase;
    animation: warningpulse 2s ease-in-out infinite;
    user-select: none;
  }
  @keyframes warningpulse {
    0%,100% { opacity: 0.5; }
    50%      { opacity: 1; }
  }

  /* THE BUTTON */
  .btn-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Outer ring spin */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid transparent;
    animation: ringspin linear infinite;
  }
  .ring-1 {
    width: 240px; height: 240px;
    border-top-color: #ff2222;
    border-right-color: #ff222244;
    animation-duration: 3s;
  }
  .ring-2 {
    width: 210px; height: 210px;
    border-bottom-color: #ff2222;
    border-left-color: #ff222244;
    animation-duration: 2.2s;
    animation-direction: reverse;
  }
  .ring-3 {
    width: 180px; height: 180px;
    border-top-color: #ff222266;
    border-right-color: #ff2222cc;
    animation-duration: 4s;
  }
  @keyframes ringspin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* Glowing button */
  .big-btn {
    position: relative;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 35%, #ff5555, #cc0000 55%, #6e0000);
    border: none;
    cursor: pointer;
    box-shadow:
      0 0 30px #ff222266,
      0 0 60px #ff222233,
      inset 0 4px 12px rgba(255,160,160,0.25),
      inset 0 -4px 12px rgba(0,0,0,0.5);
    transition: transform 0.1s, box-shadow 0.15s;
    animation: breathe 2.5s ease-in-out infinite;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  @keyframes breathe {
    0%,100% {
      box-shadow: 0 0 30px #ff222266, 0 0 60px #ff222233,
                  inset 0 4px 12px rgba(255,160,160,0.25), inset 0 -4px 12px rgba(0,0,0,0.5);
    }
    50% {
      box-shadow: 0 0 50px #ff2222aa, 0 0 100px #ff222255,
                  inset 0 4px 12px rgba(255,160,160,0.25), inset 0 -4px 12px rgba(0,0,0,0.5);
    }
  }

  .big-btn::before {
    content: '';
    position: absolute;
    top: 14px; left: 22px;
    width: 46px; height: 22px;
    background: rgba(255,255,255,0.18);
    border-radius: 50%;
    transform: rotate(-35deg);
    filter: blur(4px);
  }

  .big-btn:hover {
    transform: scale(1.06);
    box-shadow:
      0 0 60px #ff2222aa,
      0 0 120px #ff222255,
      inset 0 4px 12px rgba(255,160,160,0.3),
      inset 0 -4px 12px rgba(0,0,0,0.5);
    animation: none;
  }

  .big-btn:active {
    transform: scale(0.94);
    box-shadow:
      0 0 20px #ff222288,
      inset 0 6px 16px rgba(0,0,0,0.6),
      inset 0 -2px 8px rgba(255,100,100,0.15);
  }

  /* Label beneath */
  .label-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .dont {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(42px, 8vw, 72px);
    color: #fff;
    letter-spacing: 0.08em;
    text-shadow: 0 0 30px #ff2222aa;
    line-height: 1;
    user-select: none;
  }

  .press-it {
    font-family: 'Barlow', sans-serif;
    font-size: clamp(11px, 1.8vw, 14px);
    font-weight: 600;
    letter-spacing: 0.28em;
    color: #ff222299;
    text-transform: uppercase;
    user-select: none;
  }

  /* Particle sparks */
  .spark {
    position: fixed;
    pointer-events: none;
    z-index: 10;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #ff4444;
    animation: sparkfly 0.7s ease-out forwards;
  }
  @keyframes sparkfly {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.2); }
  }

  /* Screen flash on click */
  .flash {
    position: fixed;
    inset: 0;
    background: #ff2222;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    animation: flashout 0.4s ease-out forwards;
  }
  @keyframes flashout {
    0%   { opacity: 0.35; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<div class="scene">
  <span class="warning-text">WARNING &mdash; DO NOT PRESS</span>

  <div class="btn-wrap">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <a href="https://www.youtube.com/watch?v=xMHJGd3wwZk" target="_blank" rel="noopener" id="bigBtn" class="big-btn"></a>
  </div>

  <div class="label-wrap">
    <div class="dont">DO NOT PRESS</div>
    <div class="press-it">seriously. don't.</div>
  </div>
</div>

<script>
const btn = document.getElementById('bigBtn');

btn.addEventListener('click', function(e) {
  // Flash
  const flash = document.createElement('div');
  flash.className = 'flash';
  document.body.appendChild(flash);
  flash.addEventListener('animationend', () => flash.remove());

  // Sparks from button center
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top  + rect.height / 2;
  for (let i = 0; i < 18; i++) {
    const spark = document.createElement('div');
    spark.className = 'spark';
    const angle = (Math.PI * 2 / 18) * i + Math.random() * 0.4;
    const dist  = 60 + Math.random() * 80;
    spark.style.left = cx + 'px';
    spark.style.top  = cy + 'px';
    spark.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    spark.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    spark.style.background = Math.random() > 0.5 ? '#ff4444' : '#ffaa22';
    document.body.appendChild(spark);
    spark.addEventListener('animationend', () => spark.remove());
  }
});
</script>
</body>
</html>
